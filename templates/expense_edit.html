{{define "content"}}
<h2>Редактировать расход</h2>
<p class="page-subtitle">Изменение уже добавленного расхода для корректного расчета прибыли.</p>

<form method="POST">
  <label>Название расхода:</label><br>
  <input type="text" name="name" value="{{.Expense.Name}}" placeholder="Например: аренда" required>

  <br><br>

  <label>Сумма:</label><br>
  <input type="number" step="0.01" name="amount" value="{{.Expense.Amount}}" placeholder="Например: 50000" required>

  <br><br>

  <button type="submit">Сохранить</button>
</form>
{{end}}
